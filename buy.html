<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>매입 시세</title>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Apple SD Gothic Neo,Noto Sans KR,sans-serif;
  background:#0f1115;
  color:#f5f5f5;
}

.wrap{
  max-width:720px;
  margin:auto;
  padding:20px;
}

h1{
  font-size:22px;
  font-weight:550;
  margin-bottom:8px;
}

h2{
  font-size:20px;
  font-weight:600;
  margin:28px 0 12px;
}

.meta{
  font-size:12px;
  color:#a1a1aa;
  margin-bottom:22px;
  line-height:1.6;
}

.cards{
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:20px;
}

.card{
  background:#171a21;
  border:1px solid #3a4458;
  border-radius:18px;
  padding:24px;
  box-shadow:0 0 0 1px rgba(255,255,255,0.02) inset;
}

.title{
  font-size:17px;
  font-weight:600;
  color:#f5f5f5;
}

.sub{
  font-size:15px;
  color:#9ca3af;
  margin-top:4px;
}

.price{
  font-size:26px;
  font-weight:600;
  margin-top:18px;
  line-height:1.3;
  word-break:keep-all;
  color:#f5f5f5;
}

.perg{
  margin-top:10px;
  font-size:14px;
  color:#d1d5db;
  line-height:1.4;
}

.perg span{
  color:#9ca3af;
}

.note{
  margin-top:28px;
  font-size:12px;
  color:#9ca3af;
  line-height:1.6;
}

.loading{
  text-align:center;
  padding:40px;
  color:#9ca3af;
}

/* compact 모드 */
body.compact .wrap{
  max-width:none;
  padding:10px;
}

body.compact h1{
  font-size:18px;
  margin-bottom:6px;
}

body.compact h2{
  font-size:16px;
  margin:18px 0 8px;
}

body.compact .meta{
  font-size:12px;
  margin-bottom:10px;
  line-height:1.4;
}

body.compact .cards{
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:8px;
}

body.compact .card{
  border-radius:14px;
  padding:12px 10px;
}

body.compact .title{
  font-size:13px;
  font-weight:700;
}

body.compact .sub{
  font-size:12px;
  margin-top:3px;
}

body.compact .price{
  font-size:18px;
  margin-top:10px;
}

body.compact .perg{
  margin-top:8px;
  font-size:12px;
}

body.compact .note{
  margin-top:12px;
  font-size:12px;
  line-height:1.5;
}

body.compact .loading{
  padding:20px;
  font-size:12px;
}

@media (max-width: 768px){
  .cards{
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:14px;
  }
}

@media (max-width: 480px){
  .cards{
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:10px;
  }

  body.compact .wrap{
    padding:8px;
  }

  body.compact .cards{
    grid-template-columns:repeat(3, minmax(0, 1fr));
    gap:6px;
  }

  body.compact .card{
    padding:10px 8px;
    border-radius:12px;
  }

  body.compact .title{
    font-size:16px;
  }

  body.compact .sub{
    font-size:12px;
  }

  body.compact .price{
    font-size:16px;
  }

  body.compact .perg{
    font-size:11px;
  }
}
</style>
</head>

<body>
<div class="wrap">

<h1> 오늘의 매입 시세</h1>

<div class="meta">
  <div id="date"> 기준일: -</div>
  <div id="fx"> USD/KRW: -</div>
  <div id="update"> 업데이트: -</div>
</div>

<div id="loading" class="loading">시세 불러오는 중...</div>

<h2> [ 매입 시세 ]</h2>
<div class="cards" id="buyCards"></div>

<div class="note">
※ 표시된 매입가는 참고용 예상 단가입니다.<br>
※ 순금은 금덩어리 기준, 18K/14K는 제품 기준으로 산출됩니다.<br>
※ 최종 매입 금액은 실물 수령 후 중량, 순도, 부속물 여부 확인 뒤 확정됩니다.
</div>

</div>

<script>
const OZ_TO_G = 31.1034768;
const DON = 3.75;

const BUY_RATIO_GOLD_24K = 0.98;

// 회사 기준 순도값
const BUY_PURITY_24K = 1.0;
const BUY_PURITY_18K = 0.743;
const BUY_PURITY_14K = 0.574;

const fmt = n => new Intl.NumberFormat("ko-KR").format(Math.round(n)) + "원";
const fmtFx = n => new Intl.NumberFormat("ko-KR",{maximumFractionDigits:2}).format(n);

const params = new URLSearchParams(window.location.search);
const isCompact = params.get("mode") === "compact";

if (isCompact) {
  document.body.classList.add("compact");
}

async function fetchFx(){
  const r = await fetch("https://open.er-api.com/v6/latest/USD");
  const j = await r.json();
  return j.rates.KRW;
}

async function fetchMetal(symbol){
  const r = await fetch(`/.netlify/functions/metal?symbol=${symbol}`);
  return r.json();
}

function buyCardHtml(title, perDonPrice){
  const perG = perDonPrice / DON;

  return `
  <div class="card">
    <div class="title">${title}</div>
    <div class="sub">1돈(3.75g) 기준</div>
    <div class="price">${fmt(perDonPrice)}</div>
    <div class="perg"><span>1g 기준가:</span> ${fmt(perG)}</div>
  </div>`;
}

async function render(){
  try{
    const [fx, gold] = await Promise.all([
      fetchFx(),
      fetchMetal("xauusd")
    ]);

    document.getElementById("loading").style.display = "none";
    document.getElementById("date").textContent = "기준일: " + gold.date;
    document.getElementById("fx").textContent = "USD/KRW: " + fmtFx(fx);
    document.getElementById("update").textContent = "업데이트: " + new Date().toLocaleString("ko-KR");

    // 원시 금 시세(보정 전)
    const goldRawPerDon = (gold.close * fx) / OZ_TO_G * DON;

    // 매입 시세
    const goldBuyPerDon = goldRawPerDon * BUY_PURITY_24K * BUY_RATIO_GOLD_24K;
    const gold18kBuyPerDon = goldRawPerDon * BUY_PURITY_18K * BUY_RATIO_GOLD_24K;
    const gold14kBuyPerDon = goldRawPerDon * BUY_PURITY_14K * BUY_RATIO_GOLD_24K;

    document.getElementById("buyCards").innerHTML =
      buyCardHtml("순금 매입시세", goldBuyPerDon) +
      buyCardHtml("18K 매입시세", gold18kBuyPerDon) +
      buyCardHtml("14K 매입시세", gold14kBuyPerDon);

  } catch(e){
    document.getElementById("loading").textContent = "시세 불러오기 실패";
    console.error(e);
  }
}

render();
setInterval(render, 3600000);
</script>

</body>
</html>
