<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>오늘의 시세 (VAT 별도)</title>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Apple SD Gothic Neo,Noto Sans KR,sans-serif;
  background:#0f1115;
  color:#f5f5f5;
}

.wrap{
  max-width:720px;
  margin:auto;
  padding:20px;
}

h1{
  font-size:18px;
  font-weight:550;
  margin-bottom:8px;
}

h2{
  font-size:18px;
  font-weight:600;
  margin:28px 0 12px;
}

.meta{
  font-size:12px;
  color:#a1a1aa;
  margin-bottom:22px;
  line-height:1.6;
}

.cards{
  display:grid;
  grid-template-columns:1fr;
  gap:20px;
}

.card{
  background:#171a21;
  border:1px solid #262b36;
  border-radius:18px;
  padding:24px;
}

.title{
  font-size:17px;
  font-weight:600;
}

.sub{
  font-size:12px;
  color:#9ca3af;
  margin-top:4px;
}

.price{
  font-size:24px;
  font-weight:600;
  margin-top:18px;
  line-height:1.3;
  word-break:keep-all;
}

.perg{
  margin-top:10px;
  font-size:14px;
  color:#d1d5db;
  line-height:1.4;
}

.perg span{
  color:#9ca3af;
}

.delta{
  margin-top:12px;
  font-weight:600;
  font-size:14px;
}

.up{color:#ff5252;}
.down{color:#4dabf7;}

.note{
  margin-top:28px;
  font-size:12px;
  color:#9ca3af;
  line-height:1.6;
}

.loading{
  text-align:center;
  padding:40px;
  color:#9ca3af;
}

/* 매입가 카드 강조 */
.buy-card{
  border:1px solid #3a4458;
  box-shadow:0 0 0 1px rgba(255,255,255,0.02) inset;
}

.buy-badge{
  display:inline-block;
  font-size:11px;
  color:#f5f5f5;
  background:#2b3242;
  border:1px solid #46506a;
  padding:4px 8px;
  border-radius:999px;
  margin-bottom:10px;
}

/* compact 모드 */
body.compact .wrap{
  max-width:none;
  padding:10px;
}

body.compact h1{
  font-size:14px;
  margin-bottom:6px;
}

body.compact h2{
  font-size:13px;
  margin:18px 0 8px;
}

body.compact .meta{
  font-size:10px;
  margin-bottom:10px;
  line-height:1.4;
}

body.compact .cards{
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:8px;
}

body.compact .card{
  border-radius:14px;
  padding:12px 10px;
}

body.compact .title{
  font-size:13px;
  font-weight:700;
}

body.compact .sub{
  font-size:10px;
  margin-top:3px;
}

body.compact .price{
  font-size:16px;
  margin-top:10px;
}

body.compact .perg{
  margin-top:8px;
  font-size:11px;
}

body.compact .delta{
  margin-top:8px;
  font-size:11px;
}

body.compact .note{
  margin-top:12px;
  font-size:10px;
  line-height:1.5;
}

body.compact .loading{
  padding:20px;
  font-size:12px;
}

body.compact .buy-badge{
  font-size:9px;
  padding:3px 6px;
  margin-bottom:8px;
}

@media (max-width: 480px){
  body.compact .wrap{
    padding:8px;
  }

  body.compact .cards{
    grid-template-columns:repeat(3, minmax(0, 1fr));
    gap:6px;
  }

  body.compact .card{
    padding:10px 8px;
    border-radius:12px;
  }

  body.compact .title{
    font-size:12px;
  }

  body.compact .sub{
    font-size:9px;
  }

  body.compact .price{
    font-size:14px;
  }

  body.compact .perg{
    font-size:10px;
  }

  body.compact .delta{
    font-size:10px;
  }
}
</style>
</head>

<body>
<div class="wrap">

<h1>오늘의 시세 (VAT 별도)</h1>

<div class="meta">
  <div id="date">기준일: -</div>
  <div id="fx">USD/KRW: -</div>
  <div id="update">업데이트: -</div>
</div>

<div id="loading" class="loading">시세 불러오는 중...</div>

<h2>판매 시세</h2>
<div class="cards" id="cards"></div>

<div class="note">
※ 국제 시세(USD/oz) + 환율 기반 자동 산출<br>
※ 본 시세는 국제 시세 및 환율을 기준으로 산출한 참고가격이며 실제 판매 상품의 가격과는 다를 수 있습니다.
  
<h2>매입 시세</h2>
<div class="cards" id="buyCards"></div>

<div class="note">
※ 표시된 순금 매입가는 참고용 예상 단가입니다.<br>
※ 최종 매입 금액은 실물 수령 후 중량, 순도, 부속물 여부 확인 뒤 확정됩니다.
</div>

</div>

<script>
const OZ_TO_G = 31.1034768;
const DON = 3.75;

const ADJUST_GOLD = 1.05095;
const ADJUST_SILVER = 1.40270;
const ADJUST_PLAT = 1.07371;

// 순금 매입 반영률만 운영자가 조정
const BUY_RATIO_GOLD_24K = 0.98;

const fmt = n => new Intl.NumberFormat("ko-KR").format(Math.round(n)) + "원";
const fmtFx = n => new Intl.NumberFormat("ko-KR",{maximumFractionDigits:2}).format(n);

const params = new URLSearchParams(window.location.search);
const isCompact = params.get("mode") === "compact";

if (isCompact) {
  document.body.classList.add("compact");
}

async function fetchFx(){
  const r = await fetch("https://open.er-api.com/v6/latest/USD");
  const j = await r.json();
  return j.rates.KRW;
}

async function fetchMetal(symbol){
  const r = await fetch(`/.netlify/functions/metal?symbol=${symbol}`);
  return r.json();
}

function cardHtml(title, perDonPrice, changePct){
  const perG = perDonPrice / DON;
  const up = changePct >= 0;
  const arrow = up ? "▲" : "▼";
  const cls = up ? "up" : "down";

  return `
  <div class="card">
    <div class="title">${title}</div>
    <div class="sub">1돈(3.75g) 기준</div>
    <div class="price">${fmt(perDonPrice)}</div>
    <div class="perg"><span>1g 기준가:</span> ${fmt(perG)}</div>
    <div class="delta ${cls}">
      ${arrow} ${Math.abs(changePct).toFixed(2)}%
    </div>
  </div>`;
}

function buyCardHtml(title, perDonPrice){
  const perG = perDonPrice / DON;

  return `
  <div class="card buy-card">
    <div class="buy-badge">실시간 매입가</div>
    <div class="title">${title}</div>
    <div class="sub">1돈(3.75g) 기준</div>
    <div class="price">${fmt(perDonPrice)}</div>
    <div class="perg"><span>1g 기준가:</span> ${fmt(perG)}</div>
  </div>`;
}

async function render(){
  try{
    const [fx, gold, silver, plat] = await Promise.all([
      fetchFx(),
      fetchMetal("xauusd"),
      fetchMetal("xagusd"),
      fetchMetal("xptusd")
    ]);

    document.getElementById("loading").style.display = "none";
    document.getElementById("date").textContent = "기준일: " + gold.date;
    document.getElementById("fx").textContent = "USD/KRW: " + fmtFx(fx);
    document.getElementById("update").textContent = "업데이트: " + new Date().toLocaleString("ko-KR");

    const goldPerDon = (gold.close * fx) / OZ_TO_G * DON * ADJUST_GOLD;
    const silverPerDon = (silver.close * fx) / OZ_TO_G * DON * ADJUST_SILVER;
    const platPerDon = (plat.close * fx) / OZ_TO_G * DON * ADJUST_PLAT;

    document.getElementById("cards").innerHTML =
      cardHtml("순금 시세", goldPerDon, gold.change_pct) +
      cardHtml("백금 시세", platPerDon, plat.change_pct) +
      cardHtml("은 시세", silverPerDon, silver.change_pct);

    const goldBuyPerDon = goldPerDon * BUY_RATIO_GOLD_24K;

    document.getElementById("buyCards").innerHTML =
      buyCardHtml("순금 매입시세", goldBuyPerDon);

  } catch(e){
    document.getElementById("loading").textContent = "시세 불러오기 실패";
    console.error(e);
  }
}

render();
setInterval(render, 3600000);
</script>

</body>
</html>

</body>
</html>
